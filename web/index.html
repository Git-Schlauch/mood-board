<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mood Board</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <main id="canvas-container">
        <canvas id="mood-board-canvas">
            Your browser does not support the canvas element.
        </canvas>
    </main>

    <script src="js/api.js"></script>
    <script src="js/canvas.js"></script>
    <script src="js/sidebar.js"></script>
    <script>
        const api = new ApiClient();

        const canvasCtrl = new CanvasController(
            document.getElementById("mood-board-canvas"),
            api,
            {
                onUploadComplete: () => sidebar.refreshImageList(),
                getProjectName: () => sidebar.currentProject
                    ? sidebar.currentProject.name
                    : "Untitled Project",
            }
        );

        const sidebar = new Sidebar(api, {
            onProjectChange: () => {
                canvasCtrl.clear();
                canvasCtrl.loadImages();
            },
        });
    </script>
</body>
</html>
