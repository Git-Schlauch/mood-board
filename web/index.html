<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mood Board</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <main id="canvas-container">
        <canvas id="mood-board-canvas">
            Your browser does not support the canvas element.
        </canvas>
    </main>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/canvas.js"></script>
    <script src="js/sidebar.js"></script>
    <script>
        const api = new ApiClient();
        let auth = null;
        let canvasCtrl = null;
        let sidebar = null;

        /**
         * Start the mood board UI after authentication succeeds.
         *
         * @param {Object} user - Public user object returned by the backend.
         * @returns {void}
         */
        function startApp(user) {
            canvasCtrl = new CanvasController(
                document.getElementById("mood-board-canvas"),
                api,
                {
                    onUploadComplete: () => sidebar.refreshImageList(),
                    onChange: () => sidebar.refreshImageList(),
                    onSelectionChange: (info) => sidebar.highlightImage(info),
                    getProjectName: () => sidebar.currentProject
                        ? sidebar.currentProject.name
                        : "Untitled Project",
                }
            );

            sidebar = new Sidebar(api, {
                canvas: canvasCtrl,
                onLogout: () => auth.logout(),
                onProjectChange: () => {
                    canvasCtrl.clear();
                    canvasCtrl.loadImages();
                },
            });
        }

        auth = new AuthController(api, { onAuthenticated: startApp });
    </script>
</body>
</html>
